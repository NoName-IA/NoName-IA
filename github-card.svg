<svg width="480" height="80" viewBox="0 0 480 80" xmlns="http://www.w3.org/2000/svg">
  <rect width="480" height="80" rx="10" fill="#0D1117"/>
  <rect width="480" height="80" rx="10" fill="none" stroke="#21262D" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="80" rx="2" fill="#FF6B6B"/>

  <!-- Icon background -->
  <rect x="16" y="16" width="48" height="48" rx="8" fill="#FF6B6B" opacity="0.15"/>
  <!-- GitHub icon (simplified octocat shape via text) -->
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="26" fill="#FF6B6B" text-anchor="middle">⌥</text>

  <!-- Platform label -->
  <text x="80" y="28" font-family="Arial, sans-serif" font-size="11" fill="#8B949E" letter-spacing="1">GITHUB</text>
  <!-- Username -->
  <text x="80" y="48" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">@NoName-IA</text>
  <!-- Description -->
  <text x="80" y="65" font-family="Arial, sans-serif" font-size="12" fill="#8B949E">Full Stack Developer · Colombia 🇨🇴</text>

  <!-- Right dot indicator -->
  <circle cx="460" cy="40" r="4" fill="#FF6B6B" opacity="0.8"/>
</svg>
